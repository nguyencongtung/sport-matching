<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportMatch - Distance Preference</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>What's your distance preference?</h1>
        <div class="slider-container">
            <input type="range" min="0" max="50" value="25" class="slider" id="distanceRange">
            <p><span id="distanceValue">25</span> km</p>
        </div>
        <button id="nextButton">Next</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
