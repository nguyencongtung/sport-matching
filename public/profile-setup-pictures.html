<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportMatch - Add Pictures</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Add your recent pictures</h1>
        <p>You should add at least 1 picture and a maximum of 6 pictures.</p>
        <div id="pictureUploadContainer">
            <input type="file" id="pictureInput" accept="image/*" multiple>
            <div id="imagePreview"></div>
        </div>
        <button id="nextButton">Finish</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
